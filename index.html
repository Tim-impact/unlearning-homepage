const SANITY_PROJECT_ID = '77kdc69b';
const SANITY_DATASET = 'production';

async function fetchSanityPosts() {
  const query = encodeURIComponent(
    '*[_type == "post"] | order(publishedAt desc) {_id, title, publishedAt, "category": categories[0]->title, mainImage, body}'
  );
  const url = `https://${SANITY_PROJECT_ID}.api.sanity.io/v2024-01-01/data/query/${SANITY_DATASET}?query=${query}`;
  const res = await fetch(url);
  const data = await res.json();
  return data.result || [];
}

function getSanityImageUrl(image, width = 800) {
  if (!image?.asset?._ref) return null;
  const ref = image.asset._ref
    .replace(/^image-/, '')
    .replace(/-(jpg|jpeg|png|gif|webp|svg)$/, '.$1');
  return `https://cdn.sanity.io/images/${SANITY_PROJECT_ID}/${SANITY_DATASET}/${ref}?w=${width}&auto=format`;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

function getSummary(body) {
  if (!body) return '';
  const first = body.find(b => b._type === 'block' && b.children);
  if (!first) return '';
  return first.children.map(c => c.text || '').join('');
}

function useInView(threshold = 0.2) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setVisible(true); obs.disconnect(); }
    }, { threshold });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

}

function TermLine({ text, showCursor, size = 15 }) {
  const C = useContext(ThemeContext);
  const colorize = (t) => {
    if (t.startsWith("$")) return <><span style={{ color: C.green }}>$</span><span style={{ color: C.text }}>{t.slice(1)}</span></>;
    if (t.startsWith("> [ERROR]")) return <span style={{ color: C.red }}>{t}</span>;
    if (t.startsWith("> [WARN]")) return <span style={{ color: C.orange }}>{t}</span>;
    if (t.startsWith("> [OK]")) return <span style={{ color: C.green }}>{t}</span>;
    if (t.startsWith("> [INFO]")) return <span style={{ color: C.cyan }}>{t}</span>;
    if (t.startsWith("#")) return <span style={{ color: C.textFaint, fontStyle: "italic" }}>{t}</span>;
    return <span style={{ color: C.textDim }}>{t}</span>;
  };
  return <div style={{ fontFamily: MONO, fontSize: size, lineHeight: 1.9, whiteSpace: "pre-wrap", wordBreak: "break-word" }}>{colorize(text)}{showCursor && <Cursor />}</div>;
}

/* 타이핑 애니메이션 로직을 HeroSection 렌더링에서 분리 */
function useTypingAnimation(cmd, results) {
  const [phase, setPhase] = useState(0);
  const [cmdTyped, setCmdTyped] = useState("");
  const [resLines, setResLines] = useState([]);
  const [showContent, setShowContent] = useState(false);
  useEffect(() => {
    let cancelled = false;
    (async () => {
      await new Promise(r => setTimeout(r, TIMING.initialDelay));
      for (let i = 0; i <= cmd.length; i++) {
        if (cancelled) return; setCmdTyped(cmd.slice(0, i)); await new Promise(r => setTimeout(r, TIMING.typingChar));
      }
      setPhase(1); await new Promise(r => setTimeout(r, 300));
      for (const line of results) {
        if (cancelled) return;
        setResLines(prev => [...prev, ""]);
        for (let i = 0; i < line.length; i++) {
          if (cancelled) return;
          setResLines(prev => [...prev.slice(0, -1), line.slice(0, i + 1)]);
          await new Promise(r => setTimeout(r, TIMING.resultChar));
        }
        await new Promise(r => setTimeout(r, TIMING.resultPause));
      }
      setShowContent(true);
    })();
    return () => { cancelled = true; };
  }, []);
  return { phase, cmdTyped, resLines, showContent };
}

function ReferenceCard({ item, setView, style }) {
  const C = useContext(ThemeContext);
  const isMedia = item.type === "media";
  const handleClick = () => {
    if (isMedia) {
      if (item.mediaUrl && item.mediaUrl !== "#") {
        window.open(item.mediaUrl, "_blank", "noopener");
      } else {
        alert("샘플 링크입니다. 실데이터로 교체될 때 외부 링크가 연결됩니다.");
      }
    } else {
      setView({ type: 'reference', slug: item.slug });
      window.scrollTo(0, 0);
    }
  };
  return (
    <div
      onClick={handleClick}
      style={{
        background: C.bgCard, border: `1px solid ${C.border}`, borderRadius: 10,
        padding: 24, cursor: "pointer", transition: "transform .2s, box-shadow .2s",
        boxShadow: C.cardShadow, display: "flex", flexDirection: "column", gap: 12,
        ...style,
      }}
      onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 8px 24px rgba(0,0,0,.08)"; }}
      onMouseLeave={e => { e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.boxShadow = C.cardShadow || "none"; }}
    >
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8 }}>
        <span style={{ fontFamily: MONO, fontSize: 11, color: C.textDim, letterSpacing: ".05em" }}>
          {item.year} · {item.partner}
        </span>
        {item.isSample && <SampleBadge />}
      </div>
      <h3 style={{
        fontFamily: SANS, fontSize: 18, fontWeight: 700, color: C.textBright,
        lineHeight: 1.45, wordBreak: "keep-all", margin: 0,
      }}>
        {isMedia && <span style={{ color: C.cyan, marginRight: 6 }}>↗</span>}
        "{item.title}"
      </h3>
      <p style={{ fontFamily: SANS, fontSize: 14, color: C.textDim, lineHeight: 1.65, margin: 0, wordBreak: "keep-all" }}>
        {item.summary}
      </p>

function ReferencesListView({ setView }) {
  const C = useContext(ThemeContext);
  const R = CONTENT.references;
  const [typeFilter, setTypeFilter] = useState("all");
  const [tagFilter, setTagFilter] = useState("all");
  const [yearFilter, setYearFilter] = useState("all");

  const mediaAsItems = R.mediaMentions.map((m, i) => ({
    slug: `media-${i}`, type: "media", title: m.headline, partner: m.outlet,
    year: (m.date || "").slice(0, 4), tags: ["미디어"], summary: m.date,
    mediaUrl: m.url, isSample: m.isSample,
  }));
  const allItems = [...R.items, ...mediaAsItems];

  const allTags = Array.from(new Set(allItems.flatMap(i => i.tags || [])));
  const allYears = Array.from(new Set(allItems.map(i => i.year))).filter(Boolean).sort((a, b) => b.localeCompare(a));

  const filtered = allItems.filter(item => {
    if (typeFilter !== "all" && item.type !== typeFilter) return false;
    if (tagFilter !== "all" && (!item.tags || !item.tags.includes(tagFilter))) return false;
    if (yearFilter !== "all" && item.year !== yearFilter) return false;
    return true;
  });

  const Chip = ({ active, onClick, children }) => (
    <button onClick={onClick} style={{
      fontFamily: MONO, fontSize: 12, padding: "6px 12px", borderRadius: 4,
      background: active ? C.green : C.bgCard,
      color: active ? C.bg : C.textDim,
      border: `1px solid ${active ? C.green : C.border}`,
      cursor: "pointer", transition: "all .15s",
    }}>{children}</button>
  );

  return (
    <div style={{ paddingTop: "120px", paddingBottom: "120px", minHeight: "100vh", animation: "fadeInUp 0.5s ease" }}>
      <div style={{ maxWidth: 1100, margin: "0 auto", padding: "0 20px" }}>

        <div style={{ fontFamily: MONO, fontSize: 12, color: C.green, letterSpacing: ".2em", textTransform: "uppercase", marginBottom: 16 }}>
          // References
        </div>
        <h1 style={{ fontFamily: SANS, fontSize: "clamp(32px, 5vw, 48px)", fontWeight: 900, color: C.textBright, marginBottom: 16, wordBreak: "keep-all" }}>
          {R.heading}
        </h1>
        <p style={{ fontFamily: SANS, fontSize: 17, color: C.textDim, marginBottom: 32, lineHeight: 1.6, wordBreak: "keep-all" }}>
          {R.subheading}
        </p>

        <SampleNotice text={R.sampleNotice} />

        <div style={{ marginBottom: 32 }}>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 12, alignItems: "center" }}>
            <span style={{ fontFamily: MONO, fontSize: 11, color: C.textFaint, letterSpacing: ".1em", marginRight: 4 }}>유형</span>
            <Chip active={typeFilter === "all"} onClick={() => setTypeFilter("all")}>전체</Chip>
            <Chip active={typeFilter === "project"} onClick={() => setTypeFilter("project")}>프로젝트</Chip>
            <Chip active={typeFilter === "media"} onClick={() => setTypeFilter("media")}>미디어</Chip>
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 12, alignItems: "center" }}>
            <span style={{ fontFamily: MONO, fontSize: 11, color: C.textFaint, letterSpacing: ".1em", marginRight: 4 }}>분야</span>
            <Chip active={tagFilter === "all"} onClick={() => setTagFilter("all")}>전체</Chip>
            {allTags.map(t => <Chip key={t} active={tagFilter === t} onClick={() => setTagFilter(t)}>{t}</Chip>)}
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center" }}>
            <span style={{ fontFamily: MONO, fontSize: 11, color: C.textFaint, letterSpacing: ".1em", marginRight: 4 }}>연도</span>
            <Chip active={yearFilter === "all"} onClick={() => setYearFilter("all")}>전체</Chip>
            {allYears.map(y => <Chip key={y} active={yearFilter === y} onClick={() => setYearFilter(y)}>{y}</Chip>)}
          </div>
        </div>

        <div style={{ fontFamily: MONO, fontSize: 11, color: C.textDim, marginBottom: 16 }}>
          {filtered.length}건 표시
        </div>

        {filtered.length === 0 ? (
          <div style={{ textAlign: "center", padding: "80px 0", fontFamily: SANS, fontSize: 14, color: C.textDim }}>
            해당 조건의 사례가 없습니다.
          </div>
        ) : (
          <div className="references-grid" style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 20 }}>
            {filtered.map((item) => (
              <ReferenceCard key={item.slug} item={item} setView={setView} />
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

const CONTACT_API_URL = "https://unlearning-contact-api.vercel.app/api/contact";

function ContactModal({ open, onClose }) {
  const C = useContext(ThemeContext);
  const [privacyOpen, setPrivacyOpen] = React.useState(false);
  const [agreed, setAgreed] = React.useState(false);
  const [submitting, setSubmitting] = React.useState(false);
  const [status, setStatus] = React.useState(null);
  const [errorMsg, setErrorMsg] = React.useState("");

  useEffect(() => {
    if (!open) return;
    document.body.style.overflow = "hidden";
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => {
      document.body.style.overflow = "";
      window.removeEventListener("keydown", onKey);
    };
  }, [open, onClose]);

  if (!open) return null;

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!agreed) {
      setStatus("error");
      setErrorMsg("개인정보 수집 및 이용에 동의해 주세요.");
      return;
    }
    const fd = new FormData(e.target);
    const payload = {
      org: fd.get("org"),
      tel: fd.get("tel"),
      email: fd.get("email"),
      message: fd.get("message"),
      agreed: true,
    };
    setSubmitting(true);
    setStatus(null);
    setErrorMsg("");
    try {
      const res = await fetch(CONTACT_API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "전송에 실패했습니다.");
      setStatus("success");
      e.target.reset();
      setAgreed(false);
    } catch (err) {
      setStatus("error");
      setErrorMsg(err.message || "네트워크 오류가 발생했습니다.");
    } finally {
      setSubmitting(false);
    }
  };

  return (
    <div onClick={onClose} role="dialog" aria-modal="true" aria-labelledby="contact-modal-title" style={{ position: "fixed", inset: 0, zIndex: 9000, background: C.backdrop, display: "flex", alignItems: "center", justifyContent: "center", padding: "20px", overflowY: "auto" }}>

        </div>
        <div style={{ overflowY: "auto", padding: "28px 28px 32px" }}>

            </div>

/* ==========================================================================
   PORTABLE TEXT RENDERER
   ========================================================================== */
function PortableText({ blocks }) {
  const C = useContext(ThemeContext);
  if (!blocks) return null;
  return blocks.map((block, i) => {
    if (block._type === 'image') {
      const url = getSanityImageUrl(block, 1000);
      if (!url) return null;
      return <img key={i} src={url} alt="" style={{ maxWidth: '100%', borderRadius: 8, margin: '24px 0', display: 'block' }} />;
    }
    if (block._type === 'youtube') {
      const videoId = block.url?.match(/(?:v=|youtu\.be\/)([^&?/]+)/)?.[1];
      if (!videoId) return null;
      return (
        <div key={i} style={{ position: 'relative', paddingBottom: '56.25%', height: 0, margin: '24px 0' }}>
          <iframe src={`https://www.youtube.com/embed/${videoId}`}
            style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', border: 0, borderRadius: 8 }}
            allowFullScreen />
        </div>
      );
    }
    if (block._type !== 'block') return null;
    const children = (block.children || []).map((child, j) => {
      const text = child.text || '';
      if (!text) return null;
      const marks = child.marks || [];
      const linkKey = marks.find(m => block.markDefs?.find(d => d._key === m && d._type === 'link'));
      if (linkKey) {
        const def = block.markDefs.find(d => d._key === linkKey);
        return <a key={j} href={def.href} target="_blank" rel="noopener noreferrer" style={{ color: C.green, textDecoration: 'underline' }}>{text}</a>;
      }
      if (marks.includes('strong')) return <strong key={j}>{text}</strong>;
      if (marks.includes('em')) return <em key={j}>{text}</em>;
      if (marks.includes('underline')) return <span key={j} style={{ textDecoration: 'underline' }}>{text}</span>;
      return <span key={j}>{text}</span>;
    });
    const base = { fontFamily: SANS, lineHeight: 1.9, marginBottom: 20, wordBreak: 'keep-all' };
    switch (block.style) {
      case 'h1': return <h1 key={i} style={{ ...base, fontSize: 32, fontWeight: 700, color: C.textBright, marginTop: 40 }}>{children}</h1>;
      case 'h2': return <h2 key={i} style={{ ...base, fontSize: 26, fontWeight: 700, color: C.textBright, marginTop: 32 }}>{children}</h2>;
      case 'h3': return <h3 key={i} style={{ ...base, fontSize: 21, fontWeight: 700, color: C.textBright, marginTop: 28 }}>{children}</h3>;
      case 'h4': return <h4 key={i} style={{ ...base, fontSize: 18, fontWeight: 700, color: C.textBright, marginTop: 24 }}>{children}</h4>;
      case 'blockquote': return <blockquote key={i} style={{ ...base, borderLeft: `4px solid ${C.green}`, paddingLeft: 24, color: C.textDim, fontStyle: 'italic', margin: '24px 0' }}>{children}</blockquote>;
      default: return <p key={i} style={{ ...base, color: C.text }}>{children}</p>;
    }
  });
}

        <div className="footer-contact" style={{ fontFamily: MONO, fontSize: 14, color: C.textDim, lineHeight: 1.8 }}>
          <div>{CONTENT.footer.email}</div>
        </div>
      </div>
      <div className="footer-bottom" style={{ maxWidth: 1000, margin: "60px auto 0", paddingTop: 24, borderTop: `1px dashed ${C.border}`, display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 12, fontFamily: MONO, fontSize: 12, color: C.textFaint }}>
        <div>© 2026 unlearning company. All rights reserved.</div>
        <div>세상을 바꾸는 일에만 집중하세요.</div>
      </div>
    </footer>
  );
}

/* ==========================================================================
   APP EXPORT (라우팅 컨트롤러)
   ========================================================================== */
function App() {
  const [view, setView] = useState('home');
  const [posts, setPosts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [contactOpen, setContactOpen] = useState(false);
  const [theme, setTheme] = useState(() => {
    try {
      const saved = localStorage.getItem('theme');
      return saved === 'dark' || saved === 'light' ? saved : 'light';
    } catch (e) { return 'light'; }
  });
  const C = THEMES[theme];

  useEffect(() => {
    try { localStorage.setItem('theme', theme); } catch (e) {}
    document.documentElement.setAttribute('data-theme', theme);
    document.documentElement.style.background = C.bg;
    document.documentElement.style.color = C.text;
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', C.bg);
  }, [theme]);

  const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');

  useEffect(() => {
    fetchSanityPosts()
      .then(data => setPosts(data))
      .catch(err => {
        console.error('Sanity fetch error:', err);
        setPosts([]);
      })
      .finally(() => setLoading(false));
  }, []);

  const scrollToSection = (id) => {
    if (view !== 'home') {
      setView('home');
      setTimeout(() => {
        document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
      }, 100);
    } else {
      document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
    }
  };

  const openContact = () => setContactOpen(true);

  return (
    <ThemeContext.Provider value={C}>
      <div>
        <Nav view={view} setView={setView} scrollToSection={scrollToSection} openContact={openContact} theme={theme} toggleTheme={toggleTheme} />
        {view === 'home' && <MainView setView={setView} />}
        {view === 'curriculum' && <CurriculumView setView={setView} openContact={openContact} />}
        {view === 'news' && <NewsListView setView={setView} posts={posts} loading={loading} />}
        {typeof view === 'object' && view.type === 'post' && <NewsDetailView id={view.id} setView={setView} posts={posts} />}
        {view === 'references' && <ReferencesListView setView={setView} />}
        {typeof view === 'object' && view.type === 'reference' && <ReferenceDetailView slug={view.slug} setView={setView} />}
        <Footer />
        <ContactModal open={contactOpen} onClose={() => setContactOpen(false)} />
      </div>
    </ThemeContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
